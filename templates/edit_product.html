<!DOCTYPE html>
<html>

<head>

<title>Edit Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h3>Edit Product</h3>

<form method="post" action="/update/{{product.id}}/{{org_id}}">

<div class="mb-3">
<label>Product Name</label>
<input name="name" class="form-control" value="{{product.name}}">
</div>

<div class="mb-3">
<label>SKU</label>
<input name="sku" class="form-control" value="{{product.sku}}">
</div>

<div class="mb-3">
<label>Quantity</label>
<input name="quantity" type="number" class="form-control" value="{{product.quantity}}">
</div>

<button class="btn btn-primary">Update</button>

<a href="/dashboard/{{org_id}}" class="btn btn-secondary">Cancel</a>

</form>

</div>

</body>

</html>
