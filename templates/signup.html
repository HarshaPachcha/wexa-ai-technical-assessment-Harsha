<!DOCTYPE html>
<html>

<head>
<title>Signup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:350px">

<h4 class="text-center mb-3">Signup</h4>

<form method="post">

<input name="email" class="form-control mb-3" placeholder="Email">

<input name="password" type="password" class="form-control mb-3" placeholder="Password">

<input name="organization" class="form-control mb-3" placeholder="Organization">

<button class="btn btn-success w-100">Signup</button>

</form>

<div class="text-center mt-3">
<a href="/login">Already have account</a>
</div>

</div>

</body>
</html>
