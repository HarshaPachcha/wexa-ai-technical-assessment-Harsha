<!DOCTYPE html>
<html>

<head>
<title>Signup - StockFlow</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-4" style="width:400px">

<h3 class="text-center mb-4">Create StockFlow Account</h3>

<form method="post">

<div class="mb-3">
<label class="form-label">Email</label>
<input name="email" class="form-control" placeholder="Enter email">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input name="password" type="password" class="form-control" placeholder="Enter password">
</div>

<div class="mb-3">
<label class="form-label">Organization</label>
<input name="organization" class="form-control" placeholder="Your store name">
</div>

<button class="btn btn-success w-100">Create Account</button>

</form>

<div class="text-center mt-3">

<p>Already have an account?</p>

<a href="/login" class="btn btn-outline-success">Login</a>

</div>

</div>

</body>
</html>
